<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fairy AI</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <!-- 🧿 FAIRY EYE -->
    <div id="fairy-eye" class="fairy-eye" onclick="initSpeech()">
        <div class="iris">
            <div class="ring ring1"></div>
            <div class="ring ring2"></div>
            <div class="pupil"></div>
        </div>
    </div>

    <!-- Hint text -->
    <p class="hint">Click the eye to start speaking</p>

    <!-- JS at bottom -->
    <script src="{{ url_for('static', filename='voice.js') }}"></script>
</body>
</html>
